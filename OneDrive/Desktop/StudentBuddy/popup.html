<!DOCTYPE html>
<html>
<head>
    <title>StudentBuddy</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>

    <h2>StudentBuddy</h2>

    <h3>Attendance Calculator</h3>

    <input type="number" id="attended" placeholder="Classes Attended">
    <input type="number" id="total" placeholder="Total Classes">

    <button id="attendanceBtn">
        Calculate Attendance
    </button>

    <p id="attendanceResult">
        Attendance = 0%
    </p>

    <hr>

    <h3>CGPA Calculator</h3>

    <input type="number" id="gpa1" placeholder="Semester 1 GPA">
    <input type="number" id="gpa2" placeholder="Semester 2 GPA">
    <input type="number" id="gpa3" placeholder="Semester 3 GPA">

    <button id="cgpaBtn">
        Calculate CGPA
    </button>

    <p id="cgpaResult">
        CGPA = 0.00
    </p>

    <hr>

    <h3>Pomodoro Timer</h3>

    <p id="timer">25:00</p>

    <button id="startBtn">Start</button>
    <button id="pauseBtn">Pause</button>
    <button id="resetBtn">Reset</button>

    <script src="popup.js"></script>

</body>
</html>
