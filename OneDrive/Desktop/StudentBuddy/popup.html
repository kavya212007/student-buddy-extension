<!DOCTYPE html>
<html>
<head>
    <title>Student Buddy</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>

    <h2>📚 Student Buddy</h2>

    <input

        id="taskInput"
        placeholder="Enter Task">

    <script src="popup.js"></script>

</body>
</html>
